# ============================================================================
# MARKDOWN EXTENSIONS
# ============================================================================
markdown_extensions:
  # Table of contents
  - toc:
      permalink: true
      permalink_title: Link to this section
      toc_depth: 2               # Show H2 only in right TOC (prevents overflow)

  # Admonitions (callout boxes: note, tip, warning, etc.)
  - admonition
  - pymdownx.details              # Collapsible admonitions

  # Code blocks with syntax highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Content tabs
  - pymdownx.tabbed:
      alternate_style: true

  # Lists and tasks
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

  # Text formatting
  - pymdownx.critic              # Track changes
  - pymdownx.caret               # Superscript, insert
  - pymdownx.keys                # Keyboard keys
  - pymdownx.mark                # Highlight text
  - pymdownx.tilde               # Subscript, strikethrough

  # Smart symbols (tm, (c), etc.)
  - pymdownx.smartsymbols

  # Emoji support
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Tables
  - tables

  # HTML and attributes
  - attr_list
  - md_in_html
  - meta

  # Abbreviations
  - abbr

  # Footnotes
  - footnotes
