# ============================================================================
# SITE INFORMATION
# ============================================================================
site_name: "CUCM to Webex Calling Migration"
site_description: "Enterprise migration from CUCM & UCCX to Webex Calling & Contact Center - Multi-region compliance, India DoT/TRAI, EMEA GDPR, AI-powered contact center"
site_author: "AbhavTech - Collaboration Architecture Team"
site_url: https://abhavtech.com

# Copyright footer
copyright: Copyright &copy; 2025-2026 AbhavTech


# ============================================================================
# THEME CONFIGURATION
# ============================================================================
theme:
  name: material

  # Logo and favicon (optional - add later if needed)
  # logo: assets/logo.png
  # favicon: assets/favicon.ico

  # Color palette with dark/light mode toggle
  # Using custom colors defined in extra.css (gradient headers, matching tables)
  palette:
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Typography
  font:
    text: Inter
    code: Roboto Mono

  # Navigation and UI features
  features:
    # Navigation
    - navigation.footer          # Previous/Next at bottom
    - navigation.indexes         # Section index pages (README.md as section page)
    - navigation.instant         # SPA-like navigation (powers toc.follow tracking)
    - navigation.instant.progress # Loading progress bar
    - navigation.tracking        # URL updates on scroll (deep-link to headings)
    - navigation.tabs            # Top-level nav items become header tabs
    - navigation.tabs.sticky     # Tabs stay visible on scroll
    - navigation.top             # Back-to-top button
    - navigation.path            # Breadcrumb path below header

    # Search
    - search.highlight           # Highlight search terms in results
    - search.suggest             # Search autocomplete
    - search.share               # Shareable search links

    # Content
    - content.code.copy          # Copy button on code blocks
    - content.code.annotate      # Code annotations (numbered markers)
    - content.tabs.link          # Linked content tabs (sync across page)
    - content.tooltips           # Improved tooltips

    # Table of contents (right sidebar)
    - toc.follow                 # TOC highlights current heading as you scroll

  # Icons for admonitions
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16


# ============================================================================
# DIRECTORY CONFIGURATION
# ============================================================================
docs_dir: docs
site_dir: site


# ============================================================================
# PLUGINS
# ============================================================================
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'


# ============================================================================
# CUSTOM CSS
# ============================================================================
extra_javascript:
  - javascripts/mermaid-zoom.js

extra_css:
  - stylesheets/extra.css


# ============================================================================
# EXTRA CONFIGURATION
# ============================================================================
extra:
  generator: false               # Remove "Made with Material" footer

  # Social links in footer
  social:
    - icon: fontawesome/solid/globe
      link: https://abhavtech.com
      name: AbhavTech


