      - "8.5 BGP Handoff Playbook": chapter8-ansible/bgp-handoff.md
      - "8.6 SD-WAN Day-N Automation": chapter8-ansible/sdwan-dayn.md
      - "8.7 Webex Day-N Automation": chapter8-ansible/webex-dayn.md

  # Chapter 9 — Cloud Integrations
  - "Cloud":
      - "Chapter 9: Cloud — Overview": chapter9-cloud-integrations/README.md
