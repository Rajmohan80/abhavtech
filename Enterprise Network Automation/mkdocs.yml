# ============================================================================
# MKDOCS MATERIAL — ENTERPRISE NETWORK AUTOMATION FRAMEWORK
# ============================================================================
# Author: Rajmohan M (AbhavTech)
# Version: 2.1
# Project: Enterprise Network Automation Framework
# Based on: mkdocs-framework-template-v2.yml
#
# Infrastructure as Code documentation for SD-Access, SD-WAN, ISE,
# Webex, and Zero Trust network automation.
# ============================================================================

# ============================================================================
# SITE INFORMATION
# ============================================================================
site_name: "Enterprise Network Automation Framework"
site_description: "Infrastructure as Code for SD-Access, SD-WAN, ISE, Webex, and Zero Trust — The Practitioner's Guide to Network Automation"
site_author: "Rajmohan M"
site_url: https://automation.abhavtech.com

# Copyright footer
copyright: Copyright &copy; 2025-2026 abhavtech.com — AI-Assisted Documentation


# ============================================================================
# THEME CONFIGURATION
# ============================================================================
theme:
  name: material

  # Color palette with dark/light mode toggle
  palette:
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Typography
  font:
    text: Inter
    code: Roboto Mono

  # Navigation and UI features
  features:
    # Navigation
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path

    # Search
    - search.highlight
    - search.suggest
    - search.share

    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

    # Table of contents
    - toc.follow

  # Icons
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16


# ============================================================================
# DIRECTORY CONFIGURATION
# ============================================================================
docs_dir: docs
site_dir: site


# ============================================================================
# PLUGINS
# ============================================================================
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'


# ============================================================================
# CUSTOM CSS
# ============================================================================
extra_css:
  - stylesheets/extra.css


# ============================================================================
# EXTRA CONFIGURATION
# ============================================================================
extra:
  generator: false


# ============================================================================
# NAVIGATION STRUCTURE
# ============================================================================
nav:
  - Home: index.md

  # Chapter 1 — Executive Summary
  - "Summary":
      - "Chapter 1: Summary — Overview": chapter1-executive-summary/README.md
      - "1.1 Business Case for Automation": chapter1-executive-summary/business-case.md
      - "1.2 Scope and Documentation Relationship": chapter1-executive-summary/scope.md
      - "1.3 Toolchain Summary": chapter1-executive-summary/toolchain.md

  # Chapter 2 — Automation Architecture
  - "Architecture":
      - "Chapter 2: Architecture — Overview": chapter2-automation-architecture/README.md
      - "2.1 Enterprise Network HLD": chapter2-automation-architecture/enterprise-network-hld.md
      - "2.2 Automation Architecture": chapter2-automation-architecture/architecture.md
      - "2.3 Tool Responsibilities Matrix": chapter2-automation-architecture/tool-matrix.md
