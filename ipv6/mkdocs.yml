# ============================================================================
# MARKDOWN CONTENT RULES
# ============================================================================
#
# These rules prevent broken navigation, TOC tracking, and rendering issues:
#
# 1. ONE H1 PER PAGE
#    Every .md file must have exactly ONE # H1 heading (the page title).
#    Multiple H1s break the right-side TOC and confuse MkDocs navigation.
#    Use ## H2, ### H3, #### H4 for all sub-sections.
#    ✗ Bad:  # Part 1 ... # Part 2 ... # Part 3  (3 H1s in one file)
#    ✓ Good: # Document Title ... ## Part 1 ... ## Part 2 ... ## Part 3
#
# 2. CODE COMMENTS ≠ HEADINGS
#    Lines starting with # inside code blocks (```bash, ```python) are fine.
#    But if a code block is missing its closing ```, those # lines become
#    headings and break the page. Always verify code fences are closed.
#
# 3. NO BOM (Byte Order Mark)
#    Some Windows editors add an invisible UTF-8 BOM character (EF BB BF)
#    at the start of files. This prevents MkDocs from detecting the H1.
#    Fix: sed -i 's/\xef\xbb\xbf//g' docs/**/*.md
#    Or use VS Code → "Save with Encoding" → "UTF-8" (without BOM).
#
# 4. NO EMOJI IN HEADINGS
#    Emoji in headings (📋 📖 🎯 🆕 ✅ etc.) create malformed anchor
#    slugs that break right-TOC scroll tracking (toc.follow) and
#    deep-linking. Use emoji in body text only, never in # heading lines.
#
# 5. ASCII DIAGRAMS — KEEP THEM
#    ASCII art diagrams inside code fences (```) render perfectly as
#    monospace blocks. No need to convert to Mermaid. If you want polished
#    visuals for new diagrams, use draw.io → export SVG → embed as image.
#
# 6. HOMEPAGE = LANDING PAGE
#    index.md should link ONLY to section overviews (README.md pages).
#    Never link directly to sub-documents from the homepage — it breaks
#    the user's navigation context (they lose the tab/sidebar state).
#    Section overview pages (README.md) are the gateways to sub-docs.
#
# 7. INTERNAL LINKS
#    Use lowercase, hyphenated filenames: network-architecture.md (not
#    "Network Architecture.md"). Avoid spaces and special characters in
#    filenames — they require URL encoding and break easily.
#
# 8. LARGE PAGE GUIDANCE
#    Pages over 3,000 lines / 100 headings will cause:
#    - Right TOC occasionally losing scroll sync
#    - Sluggish browser performance
#    If a single document exceeds ~80 pages, consider splitting it into
#    multiple files under a sub-section in the nav.
#
# 9. VALIDATION
#    Run: mkdocs build --strict
#    This catches broken links, missing files, and nav mismatches.
#    Fix all WARNING lines before deploying.
#
# ============================================================================


# ============================================================================
# REQUIREMENTS.TXT
# ============================================================================
# Create a requirements.txt file with:
#
# mkdocs>=1.5.0
# mkdocs-material>=9.5.0
# pymdown-extensions>=10.0
#
# ============================================================================


# ============================================================================
# .GITIGNORE
# ============================================================================
# Create a .gitignore file with:
#
# site/
# __pycache__/
# *.pyc
# .venv/
# venv/
# .env
# .DS_Store
#
# ============================================================================


# ============================================================================
# NETLIFY.TOML
# ============================================================================
# Create a netlify.toml file with:
#
# [build]
#   command = "mkdocs build"
#   publish = "site"
#
# [build.environment]
#   PYTHON_VERSION = "3.11"
#
# ============================================================================


# ============================================================================
# DEPLOYMENT OPTIONS
# ============================================================================
#
# Netlify:
#   Push repo → auto-deploys from netlify.toml
#
# Cloudflare Pages:
#   Build command: pip install -r requirements.txt && mkdocs build
#   Output directory: site
#
# GitHub Pages:
#   mkdocs gh-deploy --force
#
# ============================================================================


# ============================================================================
# USEFUL COMMANDS
# ============================================================================
#
# Install dependencies:
#   pip install -r requirements.txt
#
# Local development (live reload):
#   mkdocs serve
#
# Local dev on different port:
#   mkdocs serve -a localhost:8001
#
# Build static site:
#   mkdocs build
#
# Build with strict validation (catches broken links):
#   mkdocs build --strict
#
# Deploy to GitHub Pages:
#   mkdocs gh-deploy --force
#
# Strip BOM characters (if headings aren't rendering):
#   sed -i 's/\xef\xbb\xbf//g' docs/**/*.md
#
# Count H1 headings per file (should be exactly 1 each):
#   grep -c '^# ' docs/**/*.md
#
# ============================================================================
