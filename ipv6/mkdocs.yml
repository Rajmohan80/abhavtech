# ============================================================================
# MKDOCS MATERIAL FRAMEWORK TEMPLATE
# ============================================================================
# Author: Raj Mohan
# Version: 2.1
# Last Updated: March 2026
#
# Reusable framework for MkDocs Material documentation sites.
# Refined through the Avaya-to-Webex CC Migration project.
#
# QUICK START:
# 1. Copy this file to your project root as mkdocs.yml
# 2. Copy extra-css-template.css to docs/stylesheets/extra.css
# 3. Update site_name, site_description, site_author, site_url
# 4. Customize colors in extra.css (see COLOR CUSTOMIZATION GUIDE inside)
# 5. Update nav structure to match your content
# 6. Create docs/ folder with your markdown files
# 7. Run: pip install -r requirements.txt
# 8. Run: mkdocs serve
#
# WHAT'S NEW IN v2.1 (lessons from Avaya-Webex project):
# - Custom color palette with gradient header (via extra.css)
# - CSS is now a SEPARATE FILE (extra-css-template.css), not embedded
# - navigation.instant RE-ENABLED (needed for toc.follow scroll tracking)
# - NO custom sidebar containment CSS (breaks toc.follow auto-scrolling)
# - Optimized features (no navigation.sections or navigation.expand)
# - Homepage design pattern (landing page, not sitemap)
# - Markdown content rules (1 H1/page, no BOM, no emoji in headings)
# ============================================================================


# ============================================================================
# SITE INFORMATION — UPDATE FOR EACH PROJECT
# ============================================================================
site_name: "AbhavTech IPv6 Migration Guide"
site_description: "Comprehensive enterprise IPv6 migration across SD-WAN, SD-Access, multi-cloud, UC, observability, and security — a complete deployment roadmap from planning to production"
site_author: "Raj Mohan"
site_url: https://ipv6.abhavtech.com/

# Copyright footer
copyright: Copyright &copy; 2025-2026 AbhavTech | AI-Assisted Documentation


# ============================================================================
# THEME CONFIGURATION
# ============================================================================
theme:
  name: material

  # Logo and favicon (place files in docs/assets/)
  # Uncomment after adding files:
  # logo: assets/logo.png
  # favicon: assets/favicon.ico

  # Color palette with dark/light mode toggle
  # Set primary to "custom" and define actual colors in extra.css
  # (this enables gradient headers, matching table headers, and footer)
  #
  # If you prefer a simple flat color instead, replace "custom" with any of:
  # red, pink, purple, deep purple, indigo, blue, light blue, cyan, teal,
  # green, light green, lime, yellow, amber, orange, deep orange, brown,
  # grey, blue grey, black, white
  # — and remove the color/header/footer sections from extra.css
  palette:
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Typography
  font:
    text: Inter
    code: Roboto Mono

  # Navigation and UI features
  #
  # ⚠️  FEATURES TO AVOID (learned the hard way):
  #
  #   navigation.sections  — Forces sidebar sections permanently open,
  #                          disables collapse/expand. Never use.
  #
  #   navigation.expand    — Auto-expands ALL sections on load. Overwhelming
  #                          for large docs. Only use for small sites (<10 pages).
  #
  #   toc.integrate        — Merges right TOC into left sidebar. Looks cleaner
  #                          but TOC entries become non-collapsible and the left
  #                          sidebar gets extremely long on deep pages. Avoid
  #                          for docs with many headings per page.
  #
  # ⚠️  CSS TO AVOID:
  #
  #   Do NOT add custom position/overflow/height CSS to .md-sidebar--secondary
  #   (e.g., position: sticky, overflow: hidden, height: calc(...)). This
  #   overrides Material's built-in sidebar scroll container and breaks
  #   toc.follow auto-scrolling. Let the theme handle sidebar containment.
  #
  features:
    # Navigation
    - navigation.footer          # Previous/Next at bottom
    - navigation.indexes         # Section index pages (README.md as section page)
    - navigation.instant         # SPA-like navigation (powers toc.follow tracking)
    - navigation.instant.progress # Loading progress bar
    - navigation.tracking        # URL updates on scroll (deep-link to headings)
    - navigation.tabs            # Top-level nav items become header tabs
    - navigation.tabs.sticky     # Tabs stay visible on scroll
    - navigation.top             # Back-to-top button
    - navigation.path            # Breadcrumb path below header

    # Search
    - search.highlight           # Highlight search terms in results
    - search.suggest             # Search autocomplete
    - search.share               # Shareable search links

    # Content
    - content.code.copy          # Copy button on code blocks
    - content.code.annotate      # Code annotations (numbered markers)
    - content.tabs.link          # Linked content tabs (sync across page)
    - content.tooltips           # Improved tooltips

    # Table of contents (right sidebar)
    - toc.follow                 # TOC highlights current heading as you scroll

  # Icons for admonitions (callout boxes)
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16


# ============================================================================
# DIRECTORY CONFIGURATION
# ============================================================================
docs_dir: docs
site_dir: site


# ============================================================================
# PLUGINS
# ============================================================================
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'


# ============================================================================
# CUSTOM CSS
# ============================================================================
# Copy extra-css-template.css to docs/stylesheets/extra.css
# and customize colors for your project.
extra_css:
  - stylesheets/extra.css


# ============================================================================
# EXTRA CONFIGURATION
# ============================================================================
extra:
  generator: false               # Remove "Made with Material" footer



# ============================================================================
# NAVIGATION STRUCTURE — CUSTOMIZE FOR YOUR PROJECT
# ============================================================================
#
# RULES & PATTERNS (learned from production):
#
# 1. Each top-level item becomes a TAB in the header bar
# 2. Use README.md as section overview pages (not index.md — avoids
#    confusion with root index.md)
# 3. Homepage (index.md) should be a LANDING PAGE — link only to
#    section overviews (README.md), never to individual docs. This
#    prevents users losing context when they click into a chapter.
#    Chapter overviews (README.md) are the proper gateways to sub-docs.
# 4. Sub-sections (nested groups) are collapsible in the left sidebar
# 5. Number your pages (1.1, 1.2, etc.) for consistent ordering
#
# PATTERN: Tabbed sections with numbered chapters
# ============================================================================

nav:
  - Home: index.md

  # CHAPTER 1 — Getting Started
  - "Getting Started":
      - "Chapter Overview": chapter1-getting-started/README.md
      - "Master Reference Card": chapter1-getting-started/master-reference-card.md
      - "Week 1: Planning & Tooling": chapter1-getting-started/week1-planning-addressing-tooling.md

  # CHAPTER 2 — SD-WAN Foundation
  - "SD-WAN Foundation":
      - "Chapter Overview": chapter2-sdwan-foundation/README.md
      - "Week 2: Mumbai Hub": chapter2-sdwan-foundation/week2-mumbai-hub-deployment.md
      - "Week 3: Remaining Hubs": chapter2-sdwan-foundation/week3-remaining-hubs-deployment.md
      - "Week 4-5: Branch Sites": chapter2-sdwan-foundation/week4-5-branch-sites-deployment.md
      - "Phase 1B: Advanced Topics": chapter2-sdwan-foundation/phase1b-sdwan-advanced-topics.md
      - "Addendum: NAT64 Troubleshooting": chapter2-sdwan-foundation/phase1-addendum-nat64-troubleshooting.md

  # CHAPTER 3 — SD-Access Overlay
  - "SD-Access Overlay":
      - "Chapter Overview": chapter3-sdaccess-overlay/README.md
      - "Phase 2: Overlay Deployment": chapter3-sdaccess-overlay/phase2-sdaccess-overlay-deployment.md
      - "Phase 2B: Advanced Topics": chapter3-sdaccess-overlay/phase2b-sdaccess-advanced-topics.md

  # CHAPTER 4 — Multi-Cloud Integration
  - "Multi-Cloud Integration":
      - "Chapter Overview": chapter4-multicloud-integration/README.md
      - "Phase 3: Multi-Cloud Deployment": chapter4-multicloud-integration/phase3-multicloud-deployment.md

  # CHAPTER 5 — Collaboration & UC
  - "Collaboration & UC":
      - "Chapter Overview": chapter5-collaboration-uc/README.md
      - "Phase 4: Webex UC Deployment": chapter5-collaboration-uc/phase4-webex-uc-deployment.md

  # CHAPTER 6 — Observability
  - "Observability":
      - "Chapter Overview": chapter6-observability/README.md
      - "Phase 5: Observability Deployment": chapter6-observability/phase5-observability-deployment.md

  # CHAPTER 7 — Security, Edge & AI
  - "Security, Edge & AI":
      - "Chapter Overview": chapter7-security-edge-ai/README.md
      - "Phase 6: Security Deployment": chapter7-security-edge-ai/phase6-security-edge-ai-deployment.md

  # APPENDICES
  - "Appendices":
      - "Disclaimer": appendices/disclaimer.md
      - "Glossary": appendices/glossary.md
      - "References": appendices/references.md
      - "Templates & Tools": appendices/templates.md
      - "SD-Access Checklist": appendices/sd-access-checklist.md


# ============================================================================
# MARKDOWN EXTENSIONS
# ============================================================================
markdown_extensions:
  # Table of contents
  - toc:
      permalink: true
      permalink_title: Link to this section
      toc_depth: 3               # Show H2 and H3 in right TOC. Use 4 only
                                 # if your H4s are meaningful navigation targets.

  # Admonitions (callout boxes: note, tip, warning, etc.)
  - admonition
  - pymdownx.details              # Collapsible admonitions

  # Code blocks with syntax highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Content tabs
  - pymdownx.tabbed:
      alternate_style: true

  # Lists and tasks
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

  # Text formatting
  - pymdownx.critic              # Track changes
  - pymdownx.caret               # Superscript, insert
  - pymdownx.keys                # Keyboard keys
  - pymdownx.mark                # Highlight text
  - pymdownx.tilde               # Subscript, strikethrough

  # Smart symbols (tm, (c), etc.)
  - pymdownx.smartsymbols

  # Emoji support
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Tables
  - tables

  # HTML and attributes
  - attr_list
  - md_in_html
  - meta

  # Abbreviations
  - abbr

  # Footnotes
  - footnotes


