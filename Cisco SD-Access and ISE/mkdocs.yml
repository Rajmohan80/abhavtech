# ============================================================================
# SD-Access & ISE Documentation — MkDocs Material
# Built from mkdocs-framework-template-v2.yml (canonical, unchanged settings)
# ============================================================================

site_name: "Cisco SD-Access & ISE Design and Implementation Guide"
site_description: "Enterprise Catalyst Center (DNAC) and ISE fabric design, security, implementation, operations, and migration"
site_author: "Rajmohan M"
site_url: https://sdaccess.abhavtech.com

copyright: Copyright &copy; 2025-2026 AbhavTech

# ============================================================================
# THEME
# ============================================================================
theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

# ============================================================================
# DIRECTORIES
# ============================================================================
docs_dir: docs
site_dir: site

# ============================================================================
# PLUGINS
# ============================================================================
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

# ============================================================================
# CUSTOM CSS
# ============================================================================
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid-zoom.js

# ============================================================================
# EXTRA (no social/footer personal links per site standard)
# ============================================================================
