site_name: "WiFi 7 Wireless-First Migration"
site_description: "Enterprise WiFi 7 (802.11be) deployment guide — wireless-first migration across a global multi-site network"
site_author: "Rajmohan M"
site_url: https://wifi7.abhavtech.com/

copyright: Copyright &copy; 2025-2026 AbhavTech

theme:
  name: material

  palette:
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Inter
    code: Roboto Mono

  features:
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow

  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

docs_dir: docs
site_dir: site

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

  social:
    - icon: fontawesome/solid/globe
      link: https://abhavtech.com
      name: AbhavTech

nav:
  - Home: index.md

  - "Foundation":
      - "Chapter 1: Executive Summary": chapter-01-executive-summary/README.md
      - "Chapter 2: WiFi 7 Technology Deep Dive": chapter-02-technology-deepdive/README.md
      - "Chapter 3: Infrastructure Assessment": chapter-03-infrastructure-assessment/README.md

  - "Architecture & Validation":
      - "Chapter 4: Pilot Site Architecture": chapter-04-pilot-architecture/README.md
      - "Chapter 5: Use Case Validation": chapter-05-use-case-validation/README.md
      - "Chapter 6: Migration Framework": chapter-06-migration-framework/README.md

  - "Integration":
      - "Chapter 7: Zero Trust Integration": chapter-07-zero-trust/README.md
      - "Chapter 8: AI Observability Integration": chapter-08-ai-observability/README.md
      - "Chapter 9: AI-Ready Network Integration": chapter-09-ai-ready-network/README.md

  - "Deployment":
      - "Chapter 10: Phased Rollout Strategy": chapter-10-phased-rollout/README.md
      - "Chapter 11: Day-0 Preparation": chapter-11-day0-preparation/README.md
      - "Chapter 12: Day-N Deployment": chapter-12-dayn-deployment/README.md

  - "Design & Operations":
      - "Chapter 13: RF Design & Site Survey": chapter-13-rf-design/README.md
      - "Chapter 14: Testing & Validation": chapter-14-testing-validation/README.md
      - "Chapter 15: Troubleshooting Playbook": chapter-15-troubleshooting/README.md
      - "Chapter 16: Wired Infrastructure Strategy": chapter-16-wired-strategy/README.md

  - "Appendices":
      - "Disclaimer": appendices/disclaimer.md

markdown_extensions:
  - toc:
      permalink: true
      permalink_title: Link to this section
      toc_depth: 2
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - meta
  - abbr
  - footnotes
