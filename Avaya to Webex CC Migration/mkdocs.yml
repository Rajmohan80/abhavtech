      - "2.2 Target Architecture": chapter2-design/target-architecture-diagram.md
      - "2.3 Telephony Architecture": chapter2-design/telephony-architecture.md
      - "2.4 Omnichannel Design": chapter2-design/omnichannel-design.md
      - "2.5 Integrations": chapter2-design/integrations.md
      - "2.6 Security & Compliance": chapter2-design/security-and-compliance.md
      - "2.7 Design Principles": chapter2-design/design-principles.md
      - "2.8 Assumptions & Dependencies": chapter2-design/assumptions-and-dependencies.md
      - "2.9 Network Architecture": chapter2-design/network-architecture.md
      - "2.10 CUBE & SBC Design": chapter2-design/cube-and-sbc-design.md
      - "2.11 Agent Endpoints": chapter2-design/agent-endpoints.md
      - "2.12 DR & Resiliency": chapter2-design/dr-and-resiliency.md
      - "2.13 Capacity & Sizing": chapter2-design/capacity-and-sizing.md
      - "2.14 License Mapping": chapter2-design/license-mapping.md
      - "2.15 AI & Automation": chapter2-design/ai-and-automation-design.md
      - ACD Routing:
          - "ACD Routing Overview": chapter2-design/acd-routing/README.md
          - "Current Avaya ACD": chapter2-design/acd-routing/current-avaya-acd.md
          - "Target Webex ACD": chapter2-design/acd-routing/target-webex-acd.md
          - "Routing Strategies": chapter2-design/acd-routing/routing-strategies.md
          - "ACD Migration Guide": chapter2-design/acd-routing/migration-guide.md
      - IVR Flows:
          - "IVR Flows Overview": chapter2-design/ivr-flows/README.md
          - "Current Avaya IVR": chapter2-design/ivr-flows/current-avaya-ivr.md
          - "Target Webex Connect": chapter2-design/ivr-flows/target-webex-connect.md

  # CHAPTER 3 — NETWORK & SECURITY
  - "Network & Security":
      - "Chapter 3 Overview": chapter3-network-security/README.md
      - "3.1 Network & Security Guide": chapter3-network-security/network-and-security.md

  # CHAPTER 4 — IMPLEMENTATION
  - "Implementation":
      - "Chapter 4 Overview": chapter4-implementation/README.md
      - "4.1 Implementation & Deployment": chapter4-implementation/implementation-and-deployment.md

  # CHAPTER 5 — OPERATIONS & MONITORING
  - "Operations & Monitoring":
      - "Chapter 5 Overview": chapter5-operations/README.md
      - "5.1 Operations & Monitoring": chapter5-operations/operations-and-monitoring.md

  # CHAPTER 6 — MIGRATION ENABLEMENT
  - "Migration Enablement":
      - "Chapter 6 Overview": chapter6-migration-enablement/README.md
      - "6.1 Technical Planning": chapter6-migration-enablement/migration-enablement-technical-planning.md

  # CHAPTER 7 — INTEGRATION & AI
  - "Integration & AI":
      - "Chapter 7 Overview": chapter7-integration/README.md
      - "7.1 Integration Architecture & Playbook": chapter7-integration/integration-architecture-playbook.md
      - "7.2 AI-Powered Virtual Agent Design": chapter7-integration/virtual-agent-design.md
      - "7.3 Predictive Routing Implementation": chapter7-integration/predictive-routing.md
      - "7.4 Integration Testing & Validation": chapter7-integration/integration-testing.md
      - "7.5 Future Roadmap": chapter7-integration/future-roadmap.md

  # APPENDICES
  - "Appendices":
      - "Disclaimer": disclaimer.md
      - "Project Summary": project-summary.md
      - "Contact": contact.md
      - "References": appendix/references.md


# ============================================================================
# MARKDOWN EXTENSIONS
# ============================================================================
markdown_extensions:
  # Table of contents
  - toc:
      permalink: true
      permalink_title: Link to this section
      toc_depth: 2

  # Admonitions (callout boxes: note, tip, warning, etc.)
  - admonition
  - pymdownx.details

  # Code blocks with syntax highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Content tabs
  - pymdownx.tabbed:
      alternate_style: true

  # Lists and tasks
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

  # Text formatting
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

  # Smart symbols (tm, (c), etc.)
  - pymdownx.smartsymbols

  # Emoji support
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Tables
  - tables

  # HTML and attributes
  - attr_list
  - md_in_html
  - meta

  # Abbreviations
  - abbr

  # Footnotes
  - footnotes


