# Local development:
#   mkdocs serve                    # Start local server at http://127.0.0.1:8000
#
# Build static site:
#   mkdocs build                    # Creates site/ folder
#
# Build with strict validation:
#   mkdocs build --strict           # Fails on warnings
#
# Install dependencies:
#   pip install -r requirements.txt
