# ============================================================================
# SITE INFORMATION
# ============================================================================
site_name: "Avaya to Webex Contact Center Migration Guide"
site_description: "End-to-end enterprise migration guide — Avaya CC to Cisco Webex Contact Center. AI-assisted documentation covering discovery, design, implementation, operations, and AI integration."
site_author: "Rajmohan M"
site_url: https://abhavtech.com/contact-center-migration/

# Copyright footer
copyright: Copyright &copy; 2024-2026 AbhavTech — AI-Assisted Documentation developed with Claude (Anthropic). All content is reference material only.


# ============================================================================
# THEME CONFIGURATION
# ============================================================================
theme:
  name: material

  # Logo and favicon (place files in docs/assets/)
  # Uncomment after adding files:
  # logo: assets/logo.png
  # favicon: assets/favicon.ico

  # Color palette with dark/light mode toggle
  palette:
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Typography
  font:
    text: Inter
    code: Roboto Mono

  # Navigation and UI features
  features:
    # Navigation
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path

    # Search
    - search.highlight
    - search.suggest
    - search.share

    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

    # Table of contents
    - toc.follow

  # Icons for admonitions (callout boxes)
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16


# ============================================================================
# DIRECTORY CONFIGURATION
# ============================================================================
docs_dir: docs
site_dir: site


# ============================================================================
# PLUGINS
# ============================================================================
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'


# ============================================================================
# CUSTOM CSS
# ============================================================================
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/external-links.js


# ============================================================================
# EXTRA CONFIGURATION
# ============================================================================
extra:
  generator: false



# ============================================================================
# NAVIGATION STRUCTURE
# ============================================================================
nav:
  - Home: index.md

  # CHAPTER 1 — DISCOVERY & ASSESSMENT
  - "Discovery & Assessment":
      - "Chapter 1 Overview": chapter1-discovery/README.md
      - "1.1 Business Requirements": chapter1-discovery/business-requirements.md
