# Netlify deployment configuration for MkDocs Material site
# (Alternative deployment option - Cloudflare Pages is recommended)

[build]
  command = "pip install -r requirements.txt && mkdocs build"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.11"

# Redirect rules (optional)
[[redirects]]
  from = "/docs/*"
  to = "/:splat"
  status = 301

# Headers for security (optional)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
