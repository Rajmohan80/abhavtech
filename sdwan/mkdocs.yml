# ============================================================================
# CISCO CATALYST SD-WAN IMPLEMENTATION GUIDE
# ============================================================================
# Based on: mkdocs-framework-template-v2.yml
# Project: SD-WAN Documentation
# Organization: AbhavTech
# Version: 1.0
# Last Updated: March 2026
# ============================================================================

# ============================================================================
# SITE INFORMATION
# ============================================================================
site_name: "Cisco Catalyst SD-WAN Implementation Guide"
site_description: "Comprehensive enterprise SD-WAN deployment guide covering architecture, security, implementation, operations, and automation"
site_author: "AbhavTech Network Architecture Team"
site_url: https://sdwan.abhavtech.com/

# Copyright footer
copyright: Copyright &copy; 2025-2026 AbhavTech


# ============================================================================
# THEME CONFIGURATION
# ============================================================================
theme:
  name: material

  # Color palette with dark/light mode toggle
  palette:
    - scheme: default
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Typography
  font:
    text: Inter
    code: Roboto Mono

  # Navigation and UI features
  features:
    # Navigation
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path

    # Search
    - search.highlight
    - search.suggest
    - search.share

    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

    # Table of contents
    - toc.follow

  # Icons
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16


# ============================================================================
# DIRECTORY CONFIGURATION
# ============================================================================
docs_dir: docs
site_dir: site


# ============================================================================
# PLUGINS
# ============================================================================
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'


# ============================================================================
# CUSTOM CSS
# ============================================================================
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid-zoom.js


# ============================================================================
# EXTRA CONFIGURATION
# ============================================================================
extra:
  generator: false

  # Social links in footer
  social:
    - icon: fontawesome/solid/globe
      link: https://abhavtech.com
      name: AbhavTech


